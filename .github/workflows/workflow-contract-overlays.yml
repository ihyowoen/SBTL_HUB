name: Apply workflow contract overlays

on:
  push:
    branches:
      - agent/workflow-contract-related-source-audit
    paths:
      - validation_scripts/apply_prompt_contract_overlays.py
      - docs/RELATED_LIFECYCLE_CONTRACT.md
      - docs/SOURCE_AUDIT_CONTRACT.md
      - docs/WORKFLOW_GAP_REMEDIATION_20260723.md
      - .github/workflows/workflow-contract-overlays.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/workflow-contract-related-source-audit
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply prompt overlays
        run: python validation_scripts/apply_prompt_contract_overlays.py --apply

      - name: Verify overlays are idempotent
        run: python validation_scripts/apply_prompt_contract_overlays.py --check

      - name: Compile validators
        run: python -m py_compile validation_scripts/*.py validation_scripts/tests/*.py

      - name: Run contract unit tests
        run: python -m unittest discover -s validation_scripts/tests -v

      - name: Commit generated prompt changes
        run: |
          if git diff --quiet -- docs/llm_prompts/v1; then
            echo "No generated prompt changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/llm_prompts/v1
          git commit -m "prompts: apply workflow contract overlays"
          git push origin HEAD:agent/workflow-contract-related-source-audit
