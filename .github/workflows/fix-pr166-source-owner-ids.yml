name: Fix PR 166 source owner IDs

on:
  push:
    branches:
      - ihyowoen-patch-42

permissions:
  contents: write

jobs:
  fix-source-owner-ids:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ihyowoen-patch-42
          fetch-depth: 0

      - name: Patch retained source owner summaries
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("public/data/cards.json")
          with path.open("r", encoding="utf-8") as handle:
              data = json.load(handle)

          expected = {
              "SPEC_20260707_134245_004": ["딜사이트tv", "todayenergy"],
              "SPEC_20260707_134245_019": ["japan_today", "reuters"],
              "SPEC_20260707_134245_030": ["ess_news", "pidg_eaaif"],
              "SPEC_20260707_134245_024": ["reuters", "news_corp_australia"],
              "SPEC_20260707_134245_023": ["energy_storage_news", "european_energy"],
              "SPEC_20260707_134245_027": ["ess_news", "ofgem"],
              "SPEC_20260707_134245_044": ["아주경제", "chosunbiz"],
          }

          seen = set()
          changed = 0
          for card in data["cards"]:
              spec_id = card.get("source_spec_id")
              if spec_id not in expected:
                  continue
              seen.add(spec_id)
              if card.get("source_owner_ids") != expected[spec_id]:
                  card["source_owner_ids"] = expected[spec_id]
                  changed += 1

          missing = sorted(set(expected) - seen)
          if missing:
              raise RuntimeError(f"Target cards not found: {missing}")
          if changed != 7:
              raise RuntimeError(f"Expected 7 metadata corrections, got {changed}")

          remaining = []
          for card in data["cards"]:
              spec_id = card.get("source_spec_id", "")
              if not spec_id.startswith("SPEC_20260707_134245_"):
                  continue
              retained = {
                  row.get("source_owner_id")
                  for row in card.get("fact_sources", [])
                  if row.get("source_owner_id")
              }
              summarized = set(card.get("source_owner_ids") or [])
              if retained != summarized:
                  remaining.append({
                      "id": card.get("id"),
                      "source_spec_id": spec_id,
                      "retained": sorted(retained),
                      "summarized": sorted(summarized),
                  })

          if remaining:
              raise RuntimeError(
                  "New-card source_owner_ids mismatches remain: "
                  + json.dumps(remaining, ensure_ascii=False)
              )

          with path.open("w", encoding="utf-8", newline="\r\n") as handle:
              json.dump(data, handle, ensure_ascii=False, indent=2)
              handle.write("\n")
          PY

      - name: Commit cards fix and remove one-time workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/cards.json
          git rm .github/workflows/fix-pr166-source-owner-ids.yml
          git commit -m "Fix retained source owner metadata"
          git push origin HEAD:ihyowoen-patch-42
